<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{common/layout :: head-resources}">
</head>
<body>
<div th:replace="~{common/layout :: layout(~{::content}, 'Customer Management')}">
<th:block th:fragment="content">

<!-- Search Bar + Add Button -->
<div class="d-flex gap-3 mb-4 flex-wrap align-items-center justify-content-between">
    <form th:action="@{/admin/customers}" method="get" class="d-flex gap-2">
        <input type="text" name="search" class="form-control" placeholder="Search by customer name..." style="max-width:280px; border-radius:10px;"/>
        <button type="submit" class="btn btn-primary-custom">Search</button>
    </form>
    <button class="btn btn-primary-custom" data-bs-toggle="modal" data-bs-target="#addCustomerModal">
        <i class="fas fa-user-plus me-2"></i>Add Customer
    </button>
</div>

<!-- Customers Table -->
<div class="data-table-card">
    <div class="card-header-custom">
        <h6><i class="fas fa-users me-2 text-primary"></i>All Customers (<span th:text="${customers.size()}">0</span>)</h6>
    </div>
    <div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead><tr>
                <th>Customer ID</th><th>Full Name</th><th>Email</th>
                <th>Mobile</th><th>City</th><th>KYC Status</th><th>Registered</th><th>Actions</th>
            </tr></thead>
            <tbody>
            <tr th:each="c : ${customers}">
                <td><code style="font-size:0.72rem;" th:text="${c.customerId}"></code></td>
                <td class="fw-bold" th:text="${c.fullName}"></td>
                <td th:text="${c.email}"></td>
                <td th:text="${c.mobileNumber}"></td>
                <td th:text="${c.city != null ? c.city : '-'}"></td>
                <td>
                    <span class="badge-status badge-verified" th:if="${c.kycStatus.name() == 'VERIFIED'}">Verified</span>
                    <span class="badge-status badge-pending" th:if="${c.kycStatus.name() == 'PENDING'}">Pending</span>
                    <span class="badge-status badge-rejected" th:if="${c.kycStatus.name() == 'REJECTED'}">Rejected</span>
                </td>
                <td style="font-size:.78rem;color:var(--text-muted);" th:text="${c.createdAt != null ? #temporals.format(c.createdAt,'dd MMM yyyy') : '-'}"></td>
                <td>
                    <div class="d-flex gap-1">
                        <form th:action="@{/admin/customers/{id}/kyc/VERIFIED(id=${c.id})}" method="POST" style="display:inline;">
                            <button type="submit" class="btn btn-sm btn-success" style="border-radius:8px;font-size:.72rem;" title="Verify KYC"><i class="fas fa-check"></i></button>
                        </form>
                        <form th:action="@{/admin/customers/{id}/kyc/REJECTED(id=${c.id})}" method="POST" style="display:inline;">
                            <button type="submit" class="btn btn-sm btn-warning" style="border-radius:8px;font-size:.72rem;" title="Reject KYC"><i class="fas fa-times"></i></button>
                        </form>
                        <form th:action="@{/admin/customers/{id}/delete(id=${c.id})}" method="POST" style="display:inline;" onsubmit="return confirm('Delete this customer? This cannot be undone.')">
                            <button type="submit" class="btn btn-sm btn-danger" style="border-radius:8px;font-size:.72rem;" title="Delete"><i class="fas fa-trash"></i></button>
                        </form>
                    </div>
                </td>
            </tr>
            <tr th:if="${customers == null or customers.empty}">
                <td colspan="8" class="text-center py-5">
                    <div class="d-flex flex-column align-items-center justify-content-center py-4">
                        <i class="fas fa-users text-muted mb-3" style="font-size:3rem;"></i>
                        <h6 class="fw-bold text-muted">No Customers Registered</h6>
                        <p class="text-muted small">No client ledger portfolios are currently registered in this database node.</p>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Add Customer Modal -->
<div class="modal fade" id="addCustomerModal" tabindex="-1" aria-labelledby="addCustomerModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content cmd-modal">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-800" id="addCustomerModalLabel" style="color:var(--text-main) !important;"><i class="fas fa-user-plus me-2"></i>Add New Customer</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="addCustomerForm" th:action="@{/admin/customers/add}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="modal-body p-4">
                    <div class="row g-3">
                        <!-- Personal Info -->
                        <div class="col-12">
                            <h6 style="font-weight:800;color:var(--primary);border-bottom:1.5px solid var(--border-color);padding-bottom:.5rem;margin-bottom:.5rem;">
                                <i class="fas fa-user me-2"></i>Personal Information
                            </h6>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Full Name <span class="text-danger">*</span></label>
                            <input type="text" name="fullName" class="form-control" placeholder="e.g. Rahul Sharma" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email <span class="text-danger">*</span></label>
                            <input type="email" name="email" class="form-control" placeholder="email@example.com" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Mobile Number <span class="text-danger">*</span></label>
                            <input type="text" name="mobileNumber" class="form-control" placeholder="10-digit mobile number" maxlength="10" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Gender</label>
                            <select name="gender" class="form-select">
                                <option value="">Select Gender</option>
                                <option value="MALE">Male</option>
                                <option value="FEMALE">Female</option>
                                <option value="OTHER">Other</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Date of Birth</label>
                            <input type="date" name="dateOfBirth" class="form-control"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">PAN Number</label>
                            <input type="text" name="panNumber" class="form-control" placeholder="ABCDE1234F" style="text-transform:uppercase;" maxlength="10"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Aadhaar Number</label>
                            <input type="text" name="aadhaarNumber" class="form-control" placeholder="12-digit Aadhaar" maxlength="12"/>
                        </div>

                        <!-- Address -->
                        <div class="col-12 mt-3">
                            <h6 style="font-weight:800;color:var(--primary);border-bottom:1.5px solid var(--border-color);padding-bottom:.5rem;margin-bottom:.5rem;">
                                <i class="fas fa-map-marker-alt me-2"></i>Address
                            </h6>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Street Address</label>
                            <input type="text" name="address" class="form-control" placeholder="Street address"/>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">City</label>
                            <input type="text" name="city" class="form-control" placeholder="City"/>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">State</label>
                            <input type="text" name="state" class="form-control" placeholder="State"/>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Pincode</label>
                            <input type="text" name="pincode" class="form-control" placeholder="6-digit pincode" maxlength="6"/>
                        </div>

                        <!-- Login Credentials -->
                        <div class="col-12 mt-3">
                            <h6 style="font-weight:800;color:var(--primary);border-bottom:1.5px solid var(--border-color);padding-bottom:.5rem;margin-bottom:.5rem;">
                                <i class="fas fa-lock me-2"></i>Login Credentials
                            </h6>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Username <span class="text-danger">*</span></label>
                            <input type="text" name="username" class="form-control" placeholder="Unique username" required minlength="4"/>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Password <span class="text-danger">*</span></label>
                            <input type="password" name="password" id="addPwd" class="form-control" placeholder="Min 6 characters" required minlength="6"/>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Confirm Password <span class="text-danger">*</span></label>
                            <input type="password" name="confirmPassword" id="addConfirmPwd" class="form-control" placeholder="Repeat password" required/>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-premium-outline btn-sm" data-bs-dismiss="modal" style="border-radius:10px; border:1.5px solid var(--border-color); color:var(--text-main); font-weight:700;">Cancel</button>
                    <button type="submit" class="btn btn-primary-custom btn-sm"><i class="fas fa-user-plus me-2"></i>Add Customer</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.getElementById('addCustomerForm').addEventListener('submit', function(e) {
    const pwd = document.getElementById('addPwd').value;
    const confirm = document.getElementById('addConfirmPwd').value;
    if (pwd !== confirm) {
        e.preventDefault();
        alert('Passwords do not match! Please re-enter.');
    }
});
</script>

</th:block>
</div>
</body>
</html>
