<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{common/layout :: head-resources}">
</head>
<body>
<div th:replace="~{common/layout :: layout(~{::content}, 'Employee Management')}">
<th:block th:fragment="content">
<div class="row g-4">
    <!-- Add Employee Card -->
    <div class="col-lg-4">
        <div class="form-card">
            <h6 style="font-weight:700;margin-bottom:1.2rem;"><i class="fas fa-user-plus me-2 text-primary"></i>Add Employee</h6>
            <form th:action="@{/admin/employees/add}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf != null}"/>
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="fullName" class="form-control" placeholder="Full name" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="email@bank.com" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label">Mobile Number</label>
                    <input type="text" name="mobile" class="form-control" placeholder="Mobile number"/>
                </div>
                <div class="mb-3">
                    <label class="form-label">Designation</label>
                    <input type="text" name="designation" class="form-control" placeholder="e.g. Loan Officer"/>
                </div>
                <div class="mb-4">
                    <label class="form-label">Branch Assignment</label>
                    <select name="branchId" class="form-select">
                        <option value="">Select Branch</option>
                        <option th:each="b : ${branches}" th:value="${b.id}" th:text="${b.branchName}"></option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary-custom w-100">Add Employee</button>
            </form>
        </div>
    </div>
    
    <!-- Employees Table Grid -->
    <div class="col-lg-8">
        <div class="data-table-card">
            <div class="card-header-custom"><h6><i class="fas fa-user-tie me-2 text-primary"></i>All Operating Employees</h6></div>
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Designation</th><th>Branch</th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody>
                    <tr th:each="e : ${employees}">
                        <td><code style="font-size:0.75rem;" th:text="${e.employeeId}"></code></td>
                        <td class="fw-bold" th:text="${e.fullName}"></td>
                        <td th:text="${e.email}"></td>
                        <td th:text="${e.designation}"></td>
                        <td th:text="${e.branch != null ? e.branch.branchName : '-'}"></td>
                        <td>
                            <span class="badge-status badge-active" th:if="${e.active}">Active</span>
                            <span class="badge-status badge-inactive" th:unless="${e.active}">Inactive</span>
                        </td>
                        <td>
                            <form th:action="@{/admin/employees/{id}/delete(id=${e.id})}" method="POST" style="display:inline;" onsubmit="return confirm('Delete employee?')">
                                <button type="submit" class="btn btn-sm btn-danger" style="border-radius:8px;font-size:.72rem;"><i class="fas fa-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${employees.empty}">
                        <td colspan="7" class="text-center py-5">
                            <div class="d-flex flex-column align-items-center justify-content-center py-4">
                                <i class="fas fa-user-tie text-muted mb-3" style="font-size:3rem;"></i>
                                <h6 class="fw-bold text-muted">No Employees Registered</h6>
                                <p class="text-muted small">No staff credentials are currently registered in this node.</p>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</th:block>
</div>
</body>
</html>
