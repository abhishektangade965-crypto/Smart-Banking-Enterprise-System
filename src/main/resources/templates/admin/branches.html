<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{common/layout :: head-resources}">
</head>
<body>
<div th:replace="~{common/layout :: layout(~{::content}, 'Branch Management')}">
<th:block th:fragment="content">
<div class="row g-4">
    <!-- Add Branch Card -->
    <div class="col-lg-4">
        <div class="form-card">
            <h6 style="font-weight:700;margin-bottom:1.2rem;"><i class="fas fa-plus-circle me-2 text-primary"></i>Add Branch</h6>
            <form th:action="@{/admin/branches/add}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf != null}"/>
                <div class="mb-3">
                    <label class="form-label">Branch Name</label>
                    <input type="text" name="name" class="form-control" placeholder="e.g. Delhi Main Branch" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label">IFSC Code</label>
                    <input type="text" name="ifsc" class="form-control" placeholder="SBNK0000001" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label">Street Address</label>
                    <input type="text" name="address" class="form-control" placeholder="Street address"/>
                </div>
                <div class="mb-3">
                    <label class="form-label">City</label>
                    <input type="text" name="city" class="form-control" placeholder="City"/>
                </div>
                <div class="mb-3">
                    <label class="form-label">State</label>
                    <input type="text" name="state" class="form-control" placeholder="State"/>
                </div>
                <div class="mb-4">
                    <label class="form-label">Branch Manager</label>
                    <input type="text" name="manager" class="form-control" placeholder="Manager name"/>
                </div>
                <button type="submit" class="btn btn-primary-custom w-100">Add Branch</button>
            </form>
        </div>
    </div>
    
    <!-- Branches Table Grid -->
    <div class="col-lg-8">
        <div class="data-table-card">
            <div class="card-header-custom"><h6><i class="fas fa-building me-2 text-primary"></i>All Operating Branches</h6></div>
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead><tr><th>Branch ID</th><th>Name</th><th>IFSC Code</th><th>City</th><th>Manager</th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody>
                    <tr th:each="b : ${branches}">
                        <td><code style="font-size:0.75rem;" th:text="${b.branchId}"></code></td>
                        <td class="fw-bold" th:text="${b.branchName}"></td>
                        <td><code style="font-size:0.75rem;" th:text="${b.ifscCode}"></code></td>
                        <td th:text="${b.city}"></td>
                        <td th:text="${b.manager}"></td>
                        <td>
                            <span class="badge-status badge-active" th:if="${b.active}">Active</span>
                            <span class="badge-status badge-inactive" th:unless="${b.active}">Inactive</span>
                        </td>
                        <td>
                            <form th:action="@{/admin/branches/{id}/delete(id=${b.id})}" method="POST" style="display:inline;" onsubmit="return confirm('Delete branch?')">
                                <button type="submit" class="btn btn-sm btn-danger" style="border-radius:8px;font-size:.72rem;"><i class="fas fa-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${branches.empty}">
                        <td colspan="7" class="text-center py-5">
                            <div class="d-flex flex-column align-items-center justify-content-center py-4">
                                <i class="fas fa-building text-muted mb-3" style="font-size:3rem;"></i>
                                <h6 class="fw-bold text-muted">No Branches Registered</h6>
                                <p class="text-muted small">No corporate bank branches are currently registered in the database grid.</p>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</th:block>
</div>
</body>
</html>
