<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{common/layout :: head-resources}">
</head>
<body>
<div th:replace="~{common/layout :: layout(~{::content}, 'Beneficiary Management')}">
<th:block th:fragment="content">
<div class="row g-4">
    <!-- Add Beneficiary Form -->
    <div class="col-lg-4">
        <div class="form-card">
            <h6 style="font-weight:700;margin-bottom:1.5rem;"><i class="fas fa-user-plus me-2 text-primary"></i>Add Beneficiary</h6>
            <form th:action="@{/customer/beneficiaries/add}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf != null}"/>
                <div class="mb-3">
                    <label class="form-label">Beneficiary Name</label>
                    <input type="text" name="name" class="form-control" placeholder="Full name" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label">Account Number</label>
                    <input type="text" name="accountNo" class="form-control" placeholder="Account number" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label">IFSC Code</label>
                    <input type="text" name="ifsc" class="form-control" placeholder="e.g. SBIN0001234" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label">Bank Name</label>
                    <input type="text" name="bank" class="form-control" placeholder="Bank name"/>
                </div>
                <div class="mb-3">
                    <label class="form-label">Nickname</label>
                    <input type="text" name="nick" class="form-control" placeholder="e.g. Mom, John"/>
                </div>
                <button type="submit" class="btn btn-primary-custom w-100">Add Beneficiary</button>
            </form>
        </div>
    </div>
    
    <!-- Beneficiary List Grid -->
    <div class="col-lg-8">
        <div class="data-table-card">
            <div class="card-header-custom"><h6><i class="fas fa-address-book me-2 text-primary"></i>My Saved Beneficiaries</h6></div>
            <div class="p-4">
                <div th:each="b : ${beneficiaries}" style="display:flex;align-items:center;gap:1rem;padding:1.2rem;border-radius:12px;border:1px solid var(--border-color);margin-bottom:.8rem;background:var(--bg-card); transition: all 0.2s;">
                    <div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:1rem;flex-shrink:0;" th:text="${#strings.substring(b.beneficiaryName,0,1).toUpperCase()}"></div>
                    <div class="flex-fill">
                        <div style="font-weight:700;font-size:.92rem;" th:text="${b.beneficiaryName}"></div>
                        <div style="font-size:.78rem;color:var(--text-muted);">
                            <span th:text="${b.bankName}"></span> &bull; <code style="font-size:.78rem; font-weight:700;" th:text="${b.accountNumber}"></code>
                        </div>
                        <div style="font-size:.75rem;color:var(--text-muted);font-weight:600;" th:text="${'IFSC: ' + b.ifscCode}"></div>
                    </div>
                    <div class="me-2">
                        <span style="font-size:.68rem;background:rgba(16, 185, 129, 0.1);color:#10b981;padding:.25rem .6rem;border-radius:6px;font-weight:700;" th:if="${b.verified}">Verified</span>
                        <span style="font-size:.68rem;background:rgba(245, 158, 11, 0.1);color:#f59e0b;padding:.25rem .6rem;border-radius:6px;font-weight:700;" th:unless="${b.verified}">Pending</span>
                    </div>
                    <div>
                        <form th:action="@{/customer/beneficiaries/{id}/delete(id=${b.id})}" method="POST" style="display:inline;" onsubmit="return confirm('Remove beneficiary?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger" style="border-radius:8px;font-size:.75rem;"><i class="fas fa-trash"></i></button>
                        </form>
                    </div>
                </div>
                
                <!-- EMPTY STATE -->
                <div th:if="${beneficiaries == null or beneficiaries.empty}" style="text-align:center;padding:3rem;color:var(--text-muted);">
                    <i class="fas fa-address-book text-muted mb-3" style="font-size:3rem;display:block;"></i>
                    <h6 class="fw-bold mb-2">No Saved Beneficiaries</h6>
                    <p class="text-muted small">Add account routing coordinates using the panel on the left to set up fast transfers.</p>
                </div>
            </div>
        </div>
    </div>
</div>
</th:block>
</div>
</body>
</html>
