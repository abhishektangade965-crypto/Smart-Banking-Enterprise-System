<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{common/layout :: head-resources}">
</head>
<body>
<div th:replace="~{common/layout :: layout(~{::content}, 'Loan Management')}">
<th:block th:fragment="content">
<div class="row g-4">
    <!-- Apply for Loan Form with Live EMI Calculator -->
    <div class="col-lg-4">
        <div class="form-card">
            <h6 style="font-weight:700;margin-bottom:1.2rem;"><i class="fas fa-file-alt me-2 text-primary"></i>Apply for Loan</h6>
            <form th:action="@{/customer/loans/apply}" method="post" th:object="${loanDto}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf != null}"/>
                
                <div class="mb-3">
                    <label class="form-label">Loan Type</label>
                    <select th:field="*{loanType}" id="loanTypeSelect" class="form-select" required>
                        <option value="">Select loan type</option>
                        <option value="HOME" data-rate="8.5">Home Loan (8.5%)</option>
                        <option value="CAR" data-rate="9.0">Car Loan (9.0%)</option>
                        <option value="EDUCATION" data-rate="7.5">Education Loan (7.5%)</option>
                        <option value="PERSONAL" data-rate="12.0">Personal Loan (12.0%)</option>
                        <option value="BUSINESS" data-rate="11.0">Business Loan (11.0%)</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Loan Amount (₹)</label>
                    <input type="number" th:field="*{amount}" id="loanAmountInput" class="form-control" placeholder="e.g. 500000" min="1000" required/>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Duration (months)</label>
                    <input type="number" th:field="*{durationMonths}" id="loanDurationInput" class="form-control" placeholder="e.g. 60" min="1" required/>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Purpose of Loan</label>
                    <input type="text" th:field="*{purpose}" class="form-control" placeholder="Purpose description"/>
                </div>

                <!-- DYNAMIC EMI CALCULATOR PREVIEW -->
                <div class="glass-panel p-3 mb-4" style="background:var(--primary-glow); border-color:rgba(79, 70, 229, 0.2);">
                    <div style="font-size:0.75rem; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:var(--primary);"><i class="fas fa-calculator me-1"></i> Estimated Monthly EMI</div>
                    <div class="mt-2 d-flex justify-content-between align-items-baseline">
                        <span style="font-size: 1.5rem; font-weight:800; color:var(--primary);" id="emiPreviewVal">₹0.00</span>
                        <span style="font-size:0.72rem; color:var(--text-muted); font-weight:600;" id="ratePreviewVal">Rate: 0%</span>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary-custom w-100">Submit Application</button>
            </form>
        </div>
    </div>
    
    <!-- My Loan Applications Grid -->
    <div class="col-lg-8">
        <div class="data-table-card">
            <div class="card-header-custom"><h6><i class="fas fa-hand-holding-usd me-2 text-primary"></i>My Loan Applications</h6></div>
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead><tr><th>Loan ID</th><th>Type</th><th>Amount</th><th>Rate%</th><th>Monthly EMI</th><th>Duration</th><th>Status</th><th>Applied</th></tr></thead>
                    <tbody>
                    <tr th:each="l : ${loans}">
                        <td><code style="font-size:.72rem;" th:text="${l.loanId}"></code></td>
                        <td><span style="font-size:.72rem;background:var(--primary-glow);color:var(--primary);padding:.25rem .5rem;border-radius:6px;font-weight:700;" th:text="${l.loanType}"></span></td>
                        <td class="fw-bold">&#x20B9;<span th:text="${#numbers.formatDecimal(l.amount,0,'COMMA',2,'POINT')}"></span></td>
                        <td th:text="${l.interestRate} + '%'" style="font-weight: 700;"></td>
                        <td class="fw-bold">&#x20B9;<span th:text="${#numbers.formatDecimal(l.emi,0,'COMMA',2,'POINT')}"></span></td>
                        <td th:text="${l.durationMonths} + ' mo'" style="font-weight: 600;"></td>
                        <td>
                            <span class="badge-status badge-pending" th:if="${l.status.name() == 'PENDING'}">Pending</span>
                            <span class="badge-status badge-active" th:if="${l.status.name() == 'APPROVED'}">Approved</span>
                            <span class="badge-status badge-rejected" th:if="${l.status.name() == 'REJECTED'}">Rejected</span>
                            <span class="badge-status badge-verified" th:if="${l.status.name() == 'ACTIVE'}">Active</span>
                        </td>
                        <td style="font-size:.78rem;color:var(--text-muted);" th:text="${#temporals.format(l.appliedAt,'dd MMM yyyy')}"></td>
                    </tr>
                    
                    <!-- EMPTY STATE -->
                    <tr th:if="${loans.empty}">
                        <td colspan="8" class="text-center py-5">
                            <div class="d-flex flex-column align-items-center justify-content-center py-4">
                                <i class="fas fa-hand-holding-usd text-muted mb-3" style="font-size: 3rem;"></i>
                                <h6 class="fw-bold text-muted">No Loan Applications Found</h6>
                                <p class="text-muted small">You haven't requested any personal, home, or business credit lines yet.</p>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const loanTypeSelect = document.getElementById('loanTypeSelect');
    const loanAmountInput = document.getElementById('loanAmountInput');
    const loanDurationInput = document.getElementById('loanDurationInput');
    const emiPreviewVal = document.getElementById('emiPreviewVal');
    const ratePreviewVal = document.getElementById('ratePreviewVal');

    function calculateEMI() {
        const selectedOption = loanTypeSelect.options[loanTypeSelect.selectedIndex];
        const rateAttr = selectedOption ? selectedOption.getAttribute('data-rate') : null;
        
        if (!rateAttr || !loanAmountInput.value || !loanDurationInput.value) {
            emiPreviewVal.innerText = "₹0.00";
            ratePreviewVal.innerText = "Rate: 0%";
            return;
        }

        const P = parseFloat(loanAmountInput.value);
        const annualRate = parseFloat(rateAttr);
        const r = annualRate / 12 / 100;
        const n = parseInt(loanDurationInput.value);

        ratePreviewVal.innerText = "Rate: " + annualRate + "%";

        if (P <= 0 || n <= 0) {
            emiPreviewVal.innerText = "₹0.00";
            return;
        }

        // EMI formula
        const emi = (P * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
        
        if (isFinite(emi)) {
            emiPreviewVal.innerText = "₹" + emi.toLocaleString('en-IN', { maximumFractionDigits: 2, minimumFractionDigits: 2 });
        } else {
            emiPreviewVal.innerText = "₹0.00";
        }
    }

    loanTypeSelect.addEventListener('change', calculateEMI);
    loanAmountInput.addEventListener('input', calculateEMI);
    loanDurationInput.addEventListener('input', calculateEMI);
});
</script>
</th:block>
</div>
</body>
</html>
