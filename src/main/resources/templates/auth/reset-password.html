<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Reset Password - SmartBank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Satisfy&family=Dancing+Script:wght@700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-glow: rgba(79, 70, 229, 0.15);
            --bg-main: #f8fafc;
            --bg-card: rgba(255, 255, 255, 0.75);
            --border-color: rgba(226, 232, 240, 0.8);
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at 10% 20%, rgba(243, 244, 246, 1) 0%, rgba(229, 231, 235, 0.6) 90.1%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            color: var(--text-main);
        }

        .card {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.45);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.05);
        }
        .logo-img-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
        }
        .logo-main-img {
            height: 44px;
            width: auto;
            object-fit: contain;
            max-width: 200px;
        }

        .logo-icon {
            width: 46px;
            height: 46px;
            border-radius: 12px;
            background: linear-gradient(135deg, #0ea5e9, var(--primary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.15rem;
            color: #fff;
            font-weight: 800;
            margin: 0 auto 1rem;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.35);
        }

        .form-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.4rem;
        }
        .form-control {
            border-radius: 10px;
            border: 1.5px solid var(--border-color);
            padding: 0.65rem 1rem;
            font-size: 0.875rem;
            background: rgba(255, 255, 255, 0.6);
            color: var(--text-main);
            transition: all 0.2s ease;
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
            background: #fff;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #3b82f6);
            border: none;
            color: #fff;
            width: 100%;
            padding: 0.75rem;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.92rem;
            box-shadow: 0 4px 15px var(--primary-glow);
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            opacity: 0.95;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.35);
            color: #fff;
        }

        .alert-danger { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: none; }
    </style>
</head>
<body>
<!-- Force CSRF session creation before response is committed -->
<div th:if="${_csrf != null}" th:text="${_csrf.token}" style="display:none;"></div>

<div class="card">
    <div class="text-center mb-4">
        <div class="logo-img-wrap">
            <img src="/images/smartbank-logo.png" alt="SmartBank" class="logo-main-img"/>
        </div>
        <h4 style="font-weight:800;color:var(--text-main); letter-spacing:-0.5px;">Reset Password</h4>
        <p style="color:var(--text-muted);font-size:.87rem; margin-top:0.3rem;">Enter your new password below</p>
    </div>
    
    <div th:if="${error}" class="alert alert-danger py-2 mb-3" style="font-size:.82rem;border-radius:8px;">
        <i class="fas fa-exclamation-circle me-1"></i><span th:text="${error}"></span>
    </div>
    
    <form th:action="@{/auth/reset-password}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf != null}"/>
        <input type="hidden" name="token" th:value="${token}"/>
        
        <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" name="password" class="form-control" placeholder="At least 6 characters" required="required"/>
        </div>
        <div class="mb-4">
            <label class="form-label">Confirm New Password</label>
            <input type="password" name="confirmPassword" class="form-control" placeholder="Repeat password" required="required"/>
        </div>
        <button type="submit" class="btn btn-primary text-white w-100 fw-700">Update Password</button>
    </form>
    <p class="text-center mt-4 mb-0" style="font-size:.85rem;"><a th:href="@{/auth/login}" style="color:var(--primary);text-decoration:none;font-weight:700;">← Back to Login</a></p>
</div>
</body>
</html>
