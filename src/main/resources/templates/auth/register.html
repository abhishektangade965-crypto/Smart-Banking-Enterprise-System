<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register - SmartBank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Satisfy&family=Dancing+Script:wght@700&display=swap" rel="stylesheet"/>
    <style>
        .back-home-btn {
            position: fixed;
            top: 1.25rem;
            left: 1.5rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #ffffff;
            border: 1.5px solid #e2e8f0;
            color: #0f172a;
            font-size: 0.82rem;
            font-weight: 700;
            padding: 0.5rem 1.1rem;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 2px 12px rgba(15,23,42,0.10);
            transition: all 0.2s ease;
            z-index: 9999;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .back-home-btn:hover {
            background: #f1f5f9;
            color: #4f46e5;
            border-color: #c7d2fe;
            box-shadow: 0 4px 16px rgba(79,70,229,0.15);
            transform: translateX(-2px);
            text-decoration: none;
        }
        .back-home-btn i {
            font-size: 0.72rem;
        }

        :root {
            --primary: #4f46e5;
            --primary-glow: rgba(79, 70, 229, 0.15);
            --bg-main: #f8fafc;
            --bg-card: rgba(255, 255, 255, 0.75);
            --border-color: rgba(226, 232, 240, 0.8);
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at 10% 20%, rgba(243, 244, 246, 1) 0%, rgba(229, 231, 235, 0.6) 90.1%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1.5rem;
            color: var(--text-main);
            position: relative;
            overflow-x: hidden;
        }

        /* Blob animations */
        .blob-bg {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.1) 0%, transparent 70%);
            z-index: -1;
        }
        .blob-bg-2 {
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.1) 0%, transparent 70%);
            z-index: -1;
        }

        .register-card {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.45);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 720px;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.05);
        }

        .register-logo-img {
            height: 50px;
            width: auto;
            object-fit: contain;
            max-width: 210px;
            margin-bottom: 0.25rem;
        }

        .register-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .register-header .logo-icon {
            width: 46px;
            height: 46px;
            border-radius: 12px;
            background: linear-gradient(135deg, #0ea5e9, var(--primary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.15rem;
            color: #fff;
            font-weight: 800;
            margin: 0 auto 1rem;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.35);
        }
        .register-header h2 {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }
        .register-header p {
            color: var(--text-muted);
            font-size: 0.88rem;
        }

        .form-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.4rem;
        }
        .form-control, .form-select {
            border-radius: 10px;
            border: 1.5px solid var(--border-color);
            font-size: 0.875rem;
            padding: 0.6rem 0.9rem;
            background: rgba(255, 255, 255, 0.6);
            color: var(--text-main);
            transition: all 0.2s ease;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
            background: #fff;
            color: var(--text-main);
        }

        .section-title {
            font-size: 0.72rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--primary);
            margin-top: 1.8rem;
            margin-bottom: 1rem;
            padding-bottom: 0.4rem;
            border-bottom: 1px solid var(--border-color);
        }
        .section-title:first-of-type { margin-top: 0; }

        .btn-register {
            background: linear-gradient(135deg, var(--primary), #3b82f6);
            border: none;
            color: #fff;
            width: 100%;
            padding: 0.8rem;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.92rem;
            box-shadow: 0 4px 15px var(--primary-glow);
            transition: all 0.2s ease;
            margin-top: 1.5rem;
        }
        .btn-register:hover {
            opacity: 0.95;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.35);
            color: #fff;
        }
    </style>
</head>
<body>
<!-- Force CSRF session creation before response is committed -->
<div th:if="${_csrf != null}" th:text="${_csrf.token}" style="display:none;"></div>

<a href="/" class="back-home-btn">
    <i class="fas fa-arrow-left" style="font-size:0.75rem;"></i> Back to Home
</a>

<div class="blob-bg"></div>
<div class="blob-bg-2"></div>

<div class="register-card">
    <div class="register-header">
        <div class="d-flex flex-column align-items-center gap-1 mb-1">
            <img src="/images/smartbank-logo.png" alt="SmartBank" class="register-logo-img"/>
        </div>
        <h2>Create Account</h2>
        <p>Join SmartBank — open your account in minutes</p>
    </div>
    <div th:if="${error}" class="alert alert-danger py-2 mb-3" style="border-radius:10px;font-size:.83rem;border:none;background:rgba(239,68,68,0.1);color:#ef4444;"><i class="fas fa-exclamation-circle me-1"></i><span th:text="${error}"></span></div>
    <form th:action="@{/auth/register}" method="post" th:object="${registration}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf != null}"/>
        
        <div class="section-title">Personal Information</div>
        <div class="row g-3 mb-3">
            <div class="col-md-6">
                <label class="form-label">Full Name *</label>
                <input type="text" class="form-control" th:field="*{fullName}" placeholder="Rahul Sharma" required/>
                <div class="text-danger" style="font-size:.75rem;" th:errors="*{fullName}"></div>
            </div>
            <div class="col-md-6">
                <label class="form-label">Email *</label>
                <input type="email" class="form-control" th:field="*{email}" placeholder="rahul@example.com" required/>
                <div class="text-danger" style="font-size:.75rem;" th:errors="*{email}"></div>
            </div>
            <div class="col-md-6">
                <label class="form-label">Mobile Number *</label>
                <input type="tel" class="form-control" th:field="*{mobileNumber}" placeholder="9876543210" required/>
                <div class="text-danger" style="font-size:.75rem;" th:errors="*{mobileNumber}"></div>
            </div>
            <div class="col-md-6">
                <label class="form-label">Gender</label>
                <select class="form-select" th:field="*{gender}">
                    <option value="">Select gender</option>
                    <option value="MALE">Male</option>
                    <option value="FEMALE">Female</option>
                    <option value="OTHER">Other</option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Date of Birth</label>
                <input type="date" class="form-control" th:field="*{dateOfBirth}"/>
            </div>
            <div class="col-md-6">
                <label class="form-label">PAN Number</label>
                <input type="text" class="form-control" th:field="*{panNumber}" placeholder="ABCDE1234F"/>
                <div class="text-danger" style="font-size:.75rem;" th:errors="*{panNumber}"></div>
            </div>
            <div class="col-12">
                <label class="form-label">Aadhaar Number</label>
                <input type="text" class="form-control" th:field="*{aadhaarNumber}" placeholder="123456789012"/>
                <div class="text-danger" style="font-size:.75rem;" th:errors="*{aadhaarNumber}"></div>
            </div>
        </div>

        <div class="section-title">Address</div>
        <div class="row g-3 mb-3">
            <div class="col-12">
                <label class="form-label">Address</label>
                <input type="text" class="form-control" th:field="*{address}" placeholder="House No, Street"/>
            </div>
            <div class="col-md-4">
                <label class="form-label">City</label>
                <input type="text" class="form-control" th:field="*{city}" placeholder="City"/>
            </div>
            <div class="col-md-4">
                <label class="form-label">State</label>
                <input type="text" class="form-control" th:field="*{state}" placeholder="State"/>
            </div>
            <div class="col-md-4">
                <label class="form-label">Pincode</label>
                <input type="text" class="form-control" th:field="*{pincode}" placeholder="110001"/>
            </div>
        </div>

        <div class="section-title">Login Credentials</div>
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <label class="form-label">Username *</label>
                <input type="text" class="form-control" th:field="*{username}" placeholder="rahul123" required/>
                <div class="text-danger" style="font-size:.75rem;" th:errors="*{username}"></div>
            </div>
            <div class="col-md-4">
                <label class="form-label">Password *</label>
                <input type="password" class="form-control" th:field="*{password}" placeholder="Min. 6 characters" required/>
                <div class="text-danger" style="font-size:.75rem;" th:errors="*{password}"></div>
            </div>
            <div class="col-md-4">
                <label class="form-label">Confirm Password *</label>
                <input type="password" class="form-control" th:field="*{confirmPassword}" placeholder="Repeat password" required/>
                <div class="text-danger" style="font-size:.75rem;" th:errors="*{confirmPassword}"></div>
            </div>
        </div>

        <button type="submit" class="btn btn-register">Create Account <i class="fas fa-arrow-right ms-1" style="font-size:0.8rem;"></i></button>
        <p class="text-center mt-4 mb-0" style="font-size:.85rem;color:var(--text-muted);">Already have an account? <a th:href="@{/auth/login}" style="color:var(--primary);font-weight:700;text-decoration:none;">Sign in</a></p>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
