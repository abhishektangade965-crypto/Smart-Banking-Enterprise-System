# Application Name
spring.application.name=SmartBank

# Server Port
server.port=${PORT:8085}

# ─── MySQL Database Configuration ────────────────────────────
# Change the password below to match your MySQL setup
spring.datasource.url=jdbc:mysql://localhost:3306/smartbank_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Properties
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Thymeleaf Properties
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# File storage path
file.upload.dir=uploads/

# JWT Secret Key
jwt.secret=${JWT_SECRET:SmartBankSecretKey2024VeryLongSecretKeyForJWTTokenGeneration}
jwt.expiration=86400000

# Logging
logging.level.com.onlinebanking=INFO
logging.level.org.springframework.security=WARN
logging.level.root=WARN

# Disable mail auto-configuration (mail not used in current version)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
